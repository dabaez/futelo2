# /etc/nginx/sites-available/futelo
# ──────────────────────────────────────────────────────────────────────────────
# Replace "your-domain.com" with your actual domain.
# Assumes Certbot has already issued an SSL certificate via
#   certbot --nginx -d your-domain.com -d www.your-domain.com
#
# Structure:
#   https://your-domain.com          → React SPA (dist/)
#   https://your-domain.com/api/…    → Node.js backend (port 3001)
#   https://your-domain.com/socket.io → Socket.io WebSocket upgrade
# ──────────────────────────────────────────────────────────────────────────────

# Rate-limit zones (protect the 1 GB droplet)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=msg_limit:10m rate=5r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;

    # ── SSL (managed by Certbot) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"               always;
    add_header X-Content-Type-Options "nosniff"                  always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    add_header Permissions-Policy     "camera=(), microphone=()";

    # ── Socket.io WebSocket ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Keep WebSocket alive on the low-resource server
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ── Backend REST API ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        # Extra limit for message sends
        location /api/message {
            limit_req zone=msg_limit burst=10 nodelay;
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── Telegram bot webhook (only needed in production webhook mode) ───────
    location ~ ^/bot[A-Za-z0-9:_-]+$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── React SPA (static files from Vite build output) ────────────────────
    root /var/www/futelo/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Long-cache for hashed assets, no-cache for index.html
        location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
